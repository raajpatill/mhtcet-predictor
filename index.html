<!DOCTYPE html>
<html>
<head>
<title>MHT CET College Predictor</title>
<p style="text-align:center;color:#64748b;">
Find your best colleges based on percentile
</p>

  
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#eff6ff,#dbeafe);
padding:20px;
}

h1{
color:#1e3a8a;
font-size:40px;
text-align:center;
}

input{
padding:12px;
font-size:18px;
border:2px solid #2563eb;
border-radius:10px;
width:250px;
}

.predictBtn{
background:#2563eb;
color:white;
border:none;
padding:12px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-left:10px;
box-shadow:0 6px 15px rgba(37,99,235,0.4);
transition:0.3s;
}

.predictBtn:hover{
transform:translateY(-3px);
box-shadow:0 15px 35px rgba(37,99,235,0.55);
}

.pdfBtn{
background:#16a34a;
color:white;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:20px;
box-shadow:0 10px 25px rgba(22,163,74,0.45);
transition:0.3s;
}

.pdfBtn:hover{
transform:translateY(-3px);
box-shadow:0 15px 35px rgba(22,163,74,0.55);
}

.card{
background:white;
padding:20px;
margin-top:15px;
border-radius:12px;
box-shadow:0 10px 25px rgba(37,99,235,0.45);
}

</style>
  
</head>

<body>

<h1>MHT CET College Predictor</h1>

<div style="text-align:center;">

<input
type="number"
id="percentile"
placeholder="Enter Percentile">

<button class="predictBtn" onclick="predict()">
🔍 Predict Colleges
</button>

</div>

<hr>

<div id="result"></div>

<br><br>

<button
id="pdfBtn"
class="pdfBtn"
onclick="downloadPDF()"
style="display:none;">
📄 Download Predicted Colleges PDF
</button>
  
<script>

let predictedColleges = [];

function predict(){
  
var p =
document.getElementById(
"percentile"
).value;

fetch(
"https://script.google.com/macros/s/AKfycbzUX2MmmiXvBpHpv_2WmTPgEOWaUnBpd7Vljjw_8JwdhXcfxM5pkBtN1mLpb-Si7h_a/exec?percentile=" +p
)

.then(response=>response.json())

.then(data=>{

predictedColleges = data;

document.getElementById("pdfBtn").style.display = "block";

let html = `
<div style="
text-align:center;
margin:20px;
font-size:22px;
font-weight:600;
color:#2563eb;">
🎯 ${data.length} Colleges Found
</div>
`;

data.forEach(item=>{

html += `
<div class="card">

<h3>🏫 ${item.college}</h3>

<p>💻 Branch: ${item.branch}</p>

<p>👥 Category: ${item.category}</p>

<p>📊 Cutoff: ${item.cutoff}</p>

</div>
`;

});

document.getElementById("result").innerHTML = html;

})

}
async function downloadPDF() {

if(predictedColleges.length === 0){

alert("Please predict colleges first");

return;

}

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

doc.setFontSize(20);

doc.text(
"MHT CET College Prediction Report",20,20);

const percentile =
document.getElementById(
"percentile"
).value;

doc.text(
"Student Percentile: " +
percentile,
20,
30
);

doc.text(
"Generated by Accidental Engineer(Rajdeep)",
20,
40
);
doc.setFontSize(12);

let y = 60;

predictedColleges.forEach((item,index)=>{

doc.text(
(index+1)+". "+item.college,
20,
y
);

y += 10;

doc.text(
"Branch: "+item.branch,
25,
y
);

y += 10;

doc.text(
"Category: "+item.category,
25,
y
);

y += 10;

doc.text(
"Cutoff: "+item.cutoff,
25,
y
);

y += 15;

});

doc.save("MHT-CET-Prediction.pdf");

}
</script>

</body>
</html>
